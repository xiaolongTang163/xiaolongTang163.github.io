name: Get Citation Data

on: 
  page_build: 
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run Crawler
      run: |
        cd ./google_scholar_crawler
        pip3 install -r requirements.txt
        python3 main.py

    - name: Push Citation Data
      run: |
        cd ./google_scholar_crawler/results
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        git init
        git add *.json
        git commit -m "Updated Citation Data" || exit 0
        git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:google-scholar-stats --force